name: Playwright E2E (HTTPS)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        run: npm i -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate self-signed cert
        run: |
          mkdir -p .certs
          openssl req -x509 -nodes -newkey rsa:2048 -days 1 -keyout .certs/server.key -out .certs/server.crt -subj '/CN=localhost'

      - name: Build
        run: pnpm run build

      - name: Start HTTPS server
        env:
          NEXT_SSL_CERT: ${{ github.workspace }}/.certs/server.crt
          NEXT_SSL_KEY: ${{ github.workspace }}/.certs/server.key
          PORT: 3000
        run: pnpm run start:https &

      - name: Wait for server
        run: npx wait-on https://localhost:3000

      - name: Run Playwright tests
        env:
          BASE_URL: https://localhost:3000
          PLAYWRIGHT_IGNORE_HTTPS: 'false'
        run: npx playwright test --reporter=html

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
